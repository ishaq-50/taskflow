services:
  - type: web
    name: taskflow-api
    runtime: node
    buildCommand: npm install --prefix server && npm install --prefix client && npm run build --prefix client && npm run build --prefix server
    startCommand: node server/dist/server.js
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        fromDatabase:
          name: taskflow-db
          property: connectionString
      - key: CLIENT_URL
        scope: runtime
        value: https://${RENDER_EXTERNAL_HOSTNAME}
      - key: JWT_ACCESS_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true

databases:
  - name: taskflow-db
    databaseName: taskflow
    user: taskflow_user
    version: 14
